<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>unatomo</title>
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/static/img/favicon/favicon.svg" type="image/svg+xml">
  <script>
    (function () {
      var STORAGE_KEY = "unatomo_lang";
      function pickLang() {
        try {
          var saved = (localStorage.getItem(STORAGE_KEY) || "").trim().toLowerCase();
          if (saved === "es" || saved === "en") return saved;
        } catch (e) {}

        var langs = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || ""];
        var first = String(langs[0] || "").trim().toLowerCase();
        return first.indexOf("es") === 0 ? "es" : "en";
      }

      var lang = pickLang();
      var target = lang === "es" ? "/es/index.html" : "/en/index.html";
      window.location.replace(target);
    })();
  </script>
  <style>
    html,body{height:100%}
    body{margin:0;display:grid;place-items:center;font:16px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:#0b0b0c;color:#f3f3f3}
    main{padding:24px;text-align:center}
    a{color:#f3f3f3}
  </style>
</head>
<body>
  <main>
    <p>Redirecting...</p>
    <p><a href="/es/index.html">Espa&ntilde;ol</a> &middot; <a href="/en/index.html">English</a></p>
  </main>
</body>
</html>
