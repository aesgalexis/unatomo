<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password · unatomo</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="/static/js/theme/theme-init.js"></script>
  <script src="/static/js/config/runtime-config.js"></script>
  <link rel="icon" href="/static/img/favicon/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html{visibility:hidden}
    main.shell.login-shell{max-width:600px;padding:110px 1.5rem 2.5rem;margin:0 auto}
    #scroll-top-button{display:none!important}
  </style>
</head>
<body class="page" data-topbar-title="Reset password" data-back-mode="history">
  <div id="topbar-mount"></div>
  <script type="module" src="/static/js/topbar.js"></script>
  <main class="shell login-shell">
    <section class="page-section" aria-label="Reset password">
      <section class="card" aria-label="Reset">
        <h3>Reset password</h3>
        <p>Enter your email and we will send you a link to set a new password.</p>
        <form id="reset-form" class="contact-form" novalidate>
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="email">Email<span aria-hidden="true"> *</span></label>
              <input id="email" name="email" type="email" required class="field" autocomplete="email" />
            </div>
          </div>
          <p id="reset-status" class="form-status" role="status" aria-live="polite" hidden></p>
          <div class="form-actions" style="display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap;">
            <button type="submit" class="btn-primary" id="reset-submit">Send link</button>
          </div>
          <p class="footer-link" style="text-align:center; margin-top:0.75rem;">
            <a href="/en/auth/login.html">Back to sign in</a>
          </p>
        </form>
      </section>
    </section>
    <div id="page-nav-mount"></div>
    <script type="module" src="/static/js/page-nav.js"></script>
    <div id="legal-footer" class="legal-footer"></div>
    <div class="footer-link">
      <a href="/en/privacidad.html">Privacy and cookie policy</a>
    </div>
  </main>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.documentElement.style.visibility = "visible";
    });
  </script>
  <script src="/static/js/footer.js"></script>
  <script type="module" src="/static/js/registro/reset-page.js"></script>
</body>
</html>
