<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · unatomo</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="/static/js/theme/theme-init.js"></script>
  <script src="/static/js/config/runtime-config.js"></script>
  <link rel="icon" href="/static/img/favicon/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html{visibility:hidden}
    main.shell.login-shell{max-width:600px;padding:110px 1.5rem 2.5rem;margin:0 auto}
    #scroll-top-button{display:none!important}
  </style>
</head>
<body class="page" data-topbar-title="Sign in" data-back-mode="history">
  <div id="topbar-mount"></div>
  <script type="module" src="/static/js/topbar.js"></script>
  <main class="shell login-shell">
    <section class="page-section" aria-label="Sign in">
      <section class="card" aria-label="Access">
        <h3>Sign in</h3>
        <p>Continue with Google or sign in with email and password.</p>
        <div class="form-actions" style="display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap;">
          <button type="button" class="btn-secondary btn-google" id="btn-google-login">
            <svg class="btn-google-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-.9 2.4-1.9 3.2l3.1 2.4c1.8-1.7 2.9-4.1 2.9-7 0-.7-.1-1.3-.2-1.9H12z"/>
            <path fill="#34A853" d="M12 22c2.6 0 4.8-.9 6.4-2.4l-3.1-2.4c-.9.6-2 .9-3.3.9-2.5 0-4.6-1.7-5.4-4H3.4v2.5A10 10 0 0 0 12 22z"/>
            <path fill="#4A90E2" d="M6.6 14.1A6 6 0 0 1 6.3 12c0-.7.1-1.4.3-2.1V7.4H3.4A10 10 0 0 0 2.3 12c0 1.6.4 3.1 1.1 4.6l3.2-2.5z"/>
            <path fill="#FBBC05" d="M12 5.9c1.4 0 2.6.5 3.5 1.4l2.6-2.6A10 10 0 0 0 3.4 7.4l3.2 2.5c.8-2.3 2.9-4 5.4-4z"/>
          </svg>
            <span class="btn-google-label">Continue with Google</span>
          </button>
        </div>
        <br>
        <form id="login-email-form" class="contact-form" novalidate>
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="email">Email<span aria-hidden="true"> *</span></label>
              <input id="email" name="email" type="email" required class="field" autocomplete="email" />
            </div>
            <div class="form-field form-field--full">
              <label for="password">Password<span aria-hidden="true"> *</span></label>
              <input id="password" name="password" type="password" required class="field" autocomplete="current-password" />
            </div>
          </div>
          <p id="login-status" class="form-status" role="status" aria-live="polite" hidden></p>
          <div class="form-actions" style="display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap;">
            <button type="submit" class="btn-primary" id="btn-email-login">Sign in</button>
          </div>
          <p class="footer-link" style="text-align:center; margin-top:0.75rem;">
            <a href="/en/auth/reset.html">I forgot my password</a>
          </p>
        </form>
      </section>
    </section>
    <div id="page-nav-mount"></div>
    <script type="module" src="/static/js/page-nav.js"></script>
    <div id="legal-footer" class="legal-footer"></div>
    <div class="footer-link">
      <a href="/en/privacidad.html">Privacy and cookie policy</a>
    </div>
  </main>
  <script src="/static/js/footer.js"></script>
  <script type="module" src="/static/js/registro/app.js"></script>
</body>
</html>
