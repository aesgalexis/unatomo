<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-logo-group">
      <a href="/en/index.html#/dashboard" class="topbar-logo-link" aria-label="Go to dashboard">
        <img
          src="/static/img/logo-unatomo-v1.6.svg"
          alt="unatomo"
          class="topbar-logo"
          loading="lazy"
        />
      </a>
      <div class="topbar-title-wrap" aria-hidden="true">
        <h2 class="topbar-title" id="topbar-title">Home</h2>
        <div class="topbar-status" id="topbar-status" aria-live="polite"></div>
      </div>
    </div>

    <div class="topbar-actions" aria-label="Session">
      <div id="notif-menu-wrap">
        <button
          id="notif-menu-btn"
          type="button"
          aria-label="Notifications"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>

        <div id="notif-menu" role="menu" hidden>
          <div id="notif-menu-label">There are no pending notifications</div>
        </div>
      </div>

      <div id="session-menu-wrap">
        <button
          id="session-menu-btn"
          type="button"
          aria-label="User menu"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 21c1.8-4 5-6 8-6s6.2 2 8 6"></path>
          </svg>
        </button>

        <div id="session-menu" role="menu" hidden>
          <div id="session-menu-label">Guest</div>
          <a
            id="session-menu-profile"
            href="/en/configuracion.html"
            role="menuitem"
            class="session-menu-link"
            hidden
          >
            User
          </a>
          <a
            id="session-menu-action"
            href="/en/auth/login.html"
            role="menuitem"
            class="session-menu-link"
          >
            Sign in
          </a>
          <a
            id="session-menu-register"
            href="/en/auth/registro.html"
            role="menuitem"
            class="session-menu-link"
          >
            Register
          </a>
        </div>
      </div>

      <div class="topbar-lang-toggle" aria-label="Language">
        <a id="lang-link-es" class="topbar-lang-link" href="/es/index.html">ES</a>
        <a id="lang-link-en" class="topbar-lang-link" href="/en/index.html">EN</a>
      </div>

      <button id="theme-toggle" type="button" aria-label="Toggle theme">
        <span class="icon" data-icon="sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" focusable="false">
            <circle cx="12" cy="12" r="4.5" fill="currentColor"></circle>
            <path d="M12 2.5v3M12 18.5v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2.5 12h3M18.5 12h3M4.9 19.1l2.1-2.1M17 7l2.1-2.1" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"></path>
          </svg>
        </span>
        <span class="icon" data-icon="moon" aria-hidden="true">☾</span>
      </button>
    </div>
  </div>
</header>
