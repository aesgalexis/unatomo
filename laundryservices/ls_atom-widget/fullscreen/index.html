<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>unatomo | Laundry Services Atom</title>
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/static/img/favicon/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/laundryservices/ls_styles.css">
  <link rel="stylesheet" href="/laundryservices/ls_atom-widget/ls_atom-widget.css">
  <link rel="stylesheet" href="/laundryservices/ls_atom-widget/fullscreen/ls_fullscreen.css">
</head>
<body class="ls-atom-fullscreen-page">
  <main class="ls-atom-fullscreen-shell">
    <section class="ls-atom-fullscreen-stage" aria-label="Atom viewer">
      <div id="atom" aria-hidden="true"></div>
    </section>

    <footer class="ls-atom-fullscreen-footer">
      <div id="legal-footer" class="legal-footer"></div>
      <div class="footer-link">
        <a href="/laundryservices/ls_privacidad.html" data-i18n="privacy_link">Politica de privacidad y cookies</a>
      </div>
    </footer>
  </main>

  <script src="/laundryservices/ls_particles.js"></script>
  <script src="/laundryservices/ls_i18n.js"></script>
  <script src="/laundryservices/ls_footer.js"></script>
  <script type="module">
    import { initAtomWidget } from "/laundryservices/ls_atom-widget/ls_atom-widget.js";

    document.documentElement.setAttribute("data-theme", "dark");

    const atomContainer = document.getElementById("atom");
    const widget = atomContainer
      ? initAtomWidget({
          container: atomContainer,
          pixelRatioCap: 2,
          atomScale: 1.6,
          orbitStyle: "original",
          protonScale: 0.5,
        })
      : null;

    window.addEventListener("beforeunload", () => {
      if (widget) widget.destroy();
    });
  </script>
</body>
</html>
