<!doctype html>
<html lang="es" class="styles-loading">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>unatomo demo</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="/static/js/theme/theme-init.js"></script>
  <style>
    html.styles-loading body { overflow: hidden; }
    html.styles-loading body > * { visibility: hidden !important; }
    html.styles-loading body::before {
      content: "";
      visibility: visible;
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      background: #fff;
    }
    html[data-theme="dark"].styles-loading body::before { background: #111; }
    html.styles-loading body::after {
      content: "Cargando demo...";
      visibility: visible;
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 2147483647;
      color: #222;
      font: 500 14px/1.2 system-ui, sans-serif;
      transform: translate(-50%, -50%);
    }
    html[data-theme="dark"].styles-loading body::after { color: #f5f5f5; }
  </style>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <script>
    window.__unatomoStylesReady = (() => {
      const links = Array.from(document.querySelectorAll('link[rel="stylesheet"]'));
      const waitForLink = (link) => {
        try {
          if (link.sheet) return Promise.resolve();
        } catch {}
        return new Promise((resolve) => {
          link.addEventListener("load", resolve, { once: true });
          link.addEventListener("error", resolve, { once: true });
        });
      };
      return Promise.all(links.map(waitForLink))
        .then(() => document.fonts?.ready || Promise.resolve())
        .then(() => document.documentElement.classList.remove("styles-loading"));
    })();
  </script>
  <link rel="icon" href="/static/img/favicon/favicon.svg" type="image/svg+xml">
</head>

<body class="page demo-page" data-topbar-title="Demo">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-logo-group">
        <a href="/nfc/" class="topbar-logo-link" aria-label="unatomo">
          <img
            src="/static/img/logo-unatomo-v1.6.svg"
            alt="unatomo"
            class="topbar-logo"
            loading="eager"
          />
        </a>
        <div class="topbar-title-wrap" aria-hidden="true">
          <h2 class="topbar-title" id="topbar-title">Demo</h2>
          <div class="topbar-status" id="topbar-status" aria-live="polite"></div>
        </div>
      </div>

      <div class="topbar-actions" aria-label="Demo">
        <span class="mc-badge">Modo demo</span>
        <button id="demoResetBtn" class="btn-secondary" type="button">Restablecer demo</button>
        <button id="theme-toggle" type="button" aria-label="Cambiar tema"></button>
      </div>
    </div>
  </header>

  <main class="shell page-shell">
    <section class="page-section">
      <div class="filter-info">
        Datos locales de prueba. No hay inicio de sesion, Firebase, Storage ni cambios reales.
      </div>
      <div id="dashboard-mount"></div>
    </section>

    <div id="legal-footer" class="legal-footer"></div>

    <div class="footer-link">
      <a href="/nfc/es/privacidad.html">Politica de privacidad y cookies</a>
    </div>
  </main>

  <script type="module" src="/demo/js/demoApp.js"></script>
  <script src="/static/js/footer.js"></script>
</body>
</html>
